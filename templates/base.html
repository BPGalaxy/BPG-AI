<script>
        function detectTextBetweenCarets(textareaElement) {
        const text = textareaElement.value;

        // The regex pattern
        const regex = /\^\^(.*?)\^\^/g;

        let matches = [];
        let match;

        // Use exec() in a loop to find all occurrences
        while ((match = regex.exec(text)) !== null) {
            // match[1] contains the text found BETWEEN the ^^
            matches.push(match[1]);
        }

        return matches;
    }

    // Example usage:
    const myTextArea = document.getElementById('myTextArea');

</script>
<script>
  const dropdown = document.getElementById('myDropdown');
  const button = document.getElementById('dropdownButton');
  const menu = document.getElementById('dropdownMenu');

  // Toggle menu on button click
  button.addEventListener('click', () => {
    dropdown.classList.toggle('show');
  });

  // Handle option selection
  menu.querySelectorAll('a').forEach(item => {
    item.addEventListener('click', (e) => {
      e.preventDefault();
      button.textContent = e.target.textContent; // Replace button text
      dropdown.classList.remove('show'); // Close menu
    });
  });

  // Close dropdown if clicked outside
  document.addEventListener('click', (e) => {
    if (!dropdown.contains(e.target) && dropdown.classList.contains('show')) {
      dropdown.classList.remove('show');
    }
  });
</script>
<script>
    // auto-resize textarea
    const textarea = document.getElementById("autoResize");
    if (textarea) {
        const resize = () => {
            textarea.style.height = "auto";
            textarea.style.height = textarea.scrollHeight + "px";
        };
        textarea.addEventListener("input", resize);
        resize();
    }

    const profileBtn = document.getElementById("profileBtn");
    const profileMenu = document.getElementById("profileMenu");

    const optionsBtn = document.getElementById("optionsBtn");
    const optionsMenu = document.getElementById("optionsMenu");

    const NewBtn = document.getElementById("NewBtn");
    const NewMenu = document.getElementById("NewMenu");

    function closeAllMenus() {
        profileMenu && profileMenu.classList.remove("open");
        optionsMenu && optionsMenu.classList.remove("open");
        NewMenu && NewMenu.classList.remove("open");
    }

    if (profileMenu && profileMenu) {
        profileBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            const isOpen = profileMenu.classList.contains("open");
            closeAllMenus();
            if (!isOpen) profileMenu.classList.add("open");
        });
    }

    if (optionsMenu && optionsMenu) {
        optionsBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            const isOpen = optionsMenu.classList.contains("open");
            closeAllMenus();
            if (!isOpen) optionsMenu.classList.add("open");
        });
    }

    if (NewMenu && NewMenu) {
        NewBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            const isOpen = NewMenu.classList.contains("open");
            closeAllMenus();
            if (!isOpen) NewMenu.classList.add("open");
        });
    }

    document.addEventListener("click", () => {
        closeAllMenus();
    });

  function showModal(level) {
    const c = config[level];
    if (level === 'notvip') {
        level = 'vip';
    }
    document.getElementById('modal-icon').textContent = c.icon;
    document.getElementById('modal-text').innerHTML   = c.text;
    document.getElementById('modal-text').innerHTML   += c.buttons;
    document.getElementById('modal').className        = 'modal ' + level;
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
